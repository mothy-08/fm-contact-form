<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Contact form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section aria-labelledby="main-heading">
        <h1 id="main-heading" class="sr-only">Contact Form</h1>
        <form>
          <h2>Contact Us</h2>

          <div class="name-wrapper">
            <div class="input-wrapper">
              <label for="first-name">
                First Name
                <span aria-hidden="true" class="required-icon">*</span>
                <span class="sr-only">This field is required</span>
              </label>
              <input id="first-name" name="first-name" type="text" required />
            </div>

            <div class="input-wrapper">
              <label for="last-name">
                Last Name
                <span aria-hidden="true" class="required-icon">*</span>
                <span class="sr-only">This field is required</span>
              </label>
              <input id="last-name" name="last-name" type="text" required />
            </div>
          </div>

          <div class="input-wrapper">
            <label for="email">
              Email Address
              <span aria-hidden="true" class="required-icon">*</span>
              <span class="sr-only">This field is required</span>
            </label>
            <input id="email" name="email" type="email" required />
          </div>

          <fieldset>
            <legend>
              Query Type
              <span aria-hidden="true" class="required-icon">*</span>
              <span class="sr-only">This field is required</span>
            </legend>

            <div class="radio-group-wrapper">
              <label class="radio-wrapper" for="general-enquiry">
                <input
                  id="general-enquiry"
                  name="query-type"
                  type="radio"
                  value="General Enquiry"
                  required
                />
                General Enquiry
              </label>

              <label class="radio-wrapper" for="support-request">
                <input
                  id="support-request"
                  name="query-type"
                  type="radio"
                  value="Support Request"
                  required
                />
                Support Request
              </label>
            </div>
          </fieldset>

          <div class="input-wrapper">
            <label for="message">
              Message
              <span aria-hidden="true" class="required-icon">*</span>
              <span class="sr-only">This field is required</span>
            </label>
            <textarea name="message" id="message" required></textarea>
          </div>

          <div class="checkbox-wrapper">
            <input
              id="consent-checkbox"
              name="consent-checkbox"
              type="checkbox"
              required
            />
            <label for="consent-checkbox">
              I consent to being contacted by the team
              <span aria-hidden="true" class="required-icon">*</span>
              <span class="sr-only">This field is required</span>
            </label>
          </div>

          <button type="submit">Submit</button>
        </form>
      </section>
    </main>

    <div class="toast">
      <h2>Message Sent!</h2>
      <p>Thanks for completing the form. We'll be in touch soon!</p>
    </div>
  </body>
</html>
